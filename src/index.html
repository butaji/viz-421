<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dot Road Audio Visualizer</title>
    <meta name="description"
        content="A browser-based music visualizer that turns live microphone input into a retro-futuristic dotted rainbow road." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dot Road Audio Visualizer" />
    <meta property="og:description"
        content="A browser-based music visualizer that turns live microphone input into a retro-futuristic dotted rainbow road." />
    <meta property="og:image" content="../pics/p1.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dot Road Audio Visualizer" />
    <meta name="twitter:description"
        content="A browser-based music visualizer that turns live microphone input into a retro-futuristic dotted rainbow road." />
    <meta name="twitter:image" content="../pics/p1.png" />
    <style>
        :root {
            color-scheme: dark;
            background: #01030a;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #01030a;
        }

        body {
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 18%, #11284f 0%, #050a16 28%, #01030a 68%);
        }

        #ui {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            padding: 22px;
            pointer-events: none;
            z-index: 2;
            opacity: 1;
            transition: opacity 500ms ease;
        }

        #ui.hidden {
            opacity: 0;
        }

        #ui.hidden .panel {
            pointer-events: none;
        }

        .panel {
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            background: rgba(2, 6, 22, 0.74);
            box-shadow: inset 0 0 0 1px rgba(94, 170, 255, 0.04), 0 24px 70px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(16px) saturate(145%);
        }

        .hero {
            max-width: min(620px, calc(100vw - 44px));
            padding: 22px;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 10px;
            color: #53f6ff;
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            font-weight: 700;
        }

        h1 {
            margin: 0 0 14px;
            color: #f7f8ff;
            font-size: clamp(44px, 7vw, 82px);
            line-height: 0.9;
            letter-spacing: -0.06em;
            max-width: 10ch;
        }

        p {
            margin: 0;
            max-width: 30ch;
            color: rgba(245, 246, 251, 0.76);
            font-size: 15px;
            line-height: 1.45;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        button {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03));
            color: #eef2ff;
            font: inherit;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 15px 22px;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .stats {
            min-width: 270px;
            padding: 18px 22px;
            display: grid;
            gap: 18px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            color: rgba(245, 246, 251, 0.62);
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .stat strong {
            color: #f7f8ff;
            font-size: 14px;
            letter-spacing: 0.14em;
        }

        @media (max-width: 860px) {
            #ui {
                flex-direction: column;
            }

            .stats {
                min-width: 0;
                width: min(100%, 360px);
            }
        }
    </style>
</head>

<body>
    <div id="ui">
        <div class="panel hero">
            <span class="eyebrow">Cosmic Audio Reactor</span>
            <h1>Dot road spectrum</h1>
            <p id="msg">Start the microphone to capture the live horizon spectrum and send each one-second snapshot down the rainbow road.</p>
            <div class="controls">
                <button id="toggle-audio">Start mic</button>
                <button id="toggle-view">View: Road</button>
                <button id="fullscreen">Fullscreen</button>
            </div>
        </div>
        <div class="panel stats">
            <div class="stat"><span>Energy</span><strong id="energy">0.00</strong></div>
            <div class="stat"><span>Punch</span><strong id="punch">0.00</strong></div>
            <div class="stat"><span>Peak</span><strong id="peak">0 Hz</strong></div>
            <div class="stat"><span>View</span><strong id="mode">Road</strong></div>
        </div>
    </div>
    <canvas id="scene"></canvas>

        <script type="module" src="./main.js"></script>

</body>

</html>
