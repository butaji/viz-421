<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Particle Audio Terrain</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #000;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>

    <script>
        (() => {
            const canvas = document.getElementById('c');
            const gl = canvas.getContext('webgl', {
                alpha: false,
                antialias: true,
                depth: false,
                stencil: false,
                premultipliedAlpha: false
            });

            if (!gl) return;

            const TERRAIN_COLS = 320;
            const TERRAIN_ROWS = 180;
            const TERRAIN_COUNT = TERRAIN_COLS * TERRAIN_ROWS;
            const TRAIL_COLS = 320;
            const TRAIL_SEGMENTS = 14;
            const TRAIL_COUNT = TRAIL_COLS * TRAIL_SEGMENTS;

            const terrainPositions = new Float32Array(TERRAIN_COUNT * 3);
            const terrainColors = new Float32Array(TERRAIN_COUNT * 3);
            const terrainSizes = new Float32Array(TERRAIN_COUNT);
            const terrainU = new Float32Array(TERRAIN_COUNT);
            const terrainV = new Float32Array(TERRAIN_COUNT);

            const trailPositions = new Float32Array(TRAIL_COUNT * 3);
            const trailColors = new Float32Array(TRAIL_COUNT * 3);
            const trailSizes = new Float32Array(TRAIL_COUNT);

            const spectrum = new Float32Array(TERRAIN_COLS);
            let columnBins = new Uint16Array(TERRAIN_COLS);
            let analyser, ac, stream, freq;
            let started = false;
            let dominantHz = 0;

            const gradientStops = [
                [0.00, [18, 160, 255]],
                [0.18, [52, 240, 255]],
                [0.34, [82, 255, 180]],
                [0.55, [255, 222, 84]],
                [0.72, [255, 138, 52]],
                [0.86, [255, 64, 184]],
                [1.00, [140, 74, 255]]
            ];

            const vertexSrc = `
                attribute vec3 aPosition;
                attribute vec3 aColor;
                attribute float aSize;

                uniform float uAspect;
                uniform float uPointScale;

                varying vec3 vColor;
                varying float vAlpha;
                varying float vDepth;

                void main() {
                    vec3 p = aPosition;
                    float pitch = -0.92;
                    float cp = cos(pitch);
                    float sp = sin(pitch);

                    vec3 r;
                    r.x = p.x;
                    r.y = p.y * cp - p.z * sp;
                    r.z = p.y * sp + p.z * cp + 8.0;

                    float perspective = 1.55 / max(r.z, 0.1);
                    gl_Position = vec4(r.x * perspective / uAspect, r.y * perspective, 0.0, 1.0);
                    gl_PointSize = max(1.0, aSize * perspective * uPointScale);

                    vColor = aColor;
                    vAlpha = clamp(perspective * 2.1, 0.0, 1.0);
                    vDepth = clamp(1.0 - r.z * 0.04, 0.0, 1.0);
                }
            `;

            const fragmentSrc = `
                precision mediump float;

                varying vec3 vColor;
                varying float vAlpha;
                varying float vDepth;

                void main() {
                    vec2 uv = gl_PointCoord * 2.0 - 1.0;
                    float d = dot(uv, uv);
                    if (d > 1.0) discard;

                    float core = smoothstep(0.32, 0.0, d);
                    float glow = exp(-d * 3.8);
                    float fog = mix(0.55, 1.0, vDepth);
                    vec3 color = vColor * (0.22 * glow + 0.92 * core) * fog;
                    float alpha = (0.18 * glow + 0.95 * core) * vAlpha * fog;

                    gl_FragColor = vec4(color, alpha);
                }
            `;

            function compile(type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                return shader;
            }

            const program = gl.createProgram();
            gl.attachShader(program, compile(gl.VERTEX_SHADER, vertexSrc));
            gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fragmentSrc));
            gl.linkProgram(program);
            gl.useProgram(program);

            const locPosition = gl.getAttribLocation(program, 'aPosition');
            const locColor = gl.getAttribLocation(program, 'aColor');
            const locSize = gl.getAttribLocation(program, 'aSize');
            const locAspect = gl.getUniformLocation(program, 'uAspect');
            const locPointScale = gl.getUniformLocation(program, 'uPointScale');

            const terrainPosBuffer = gl.createBuffer();
            const terrainColorBuffer = gl.createBuffer();
            const terrainSizeBuffer = gl.createBuffer();
            const trailPosBuffer = gl.createBuffer();
            const trailColorBuffer = gl.createBuffer();
            const trailSizeBuffer = gl.createBuffer();

            function clamp(v, lo, hi) {
                return Math.max(lo, Math.min(hi, v));
            }

            function mix(a, b, t) {
                return a + (b - a) * t;
            }

            function paletteColor(t) {
                const x = clamp(t, 0, 1);
                for (let i = 0; i < gradientStops.length - 1; i++) {
                    const a = gradientStops[i];
                    const b = gradientStops[i + 1];
                    if (x <= b[0]) {
                        const f = (x - a[0]) / (b[0] - a[0]);
                        return [
                            mix(a[1][0], b[1][0], f) / 255,
                            mix(a[1][1], b[1][1], f) / 255,
                            mix(a[1][2], b[1][2], f) / 255
                        ];
                    }
                }
                const last = gradientStops[gradientStops.length - 1][1];
                return [last[0] / 255, last[1] / 255, last[2] / 255];
            }

            function logIndex(i, n, minHz, maxHz, sampleRate) {
                const nyquist = sampleRate / 2;
                const lo = Math.max(20, minHz);
                const hi = Math.min(nyquist, maxHz);
                const frac = i / Math.max(1, n - 1);
                const hz = lo * Math.pow(hi / lo, frac);
                const bin = Math.round((hz / nyquist) * (freq.length - 1));
                return clamp(bin, 0, freq.length - 1);
            }

            function rebuildBinMap() {
                if (!ac || !freq) return;
                for (let i = 0; i < TERRAIN_COLS; i++) {
                    columnBins[i] = logIndex(i, TERRAIN_COLS, 24, 16000, ac.sampleRate);
                }
            }

            function initStaticData() {
                let t = 0;
                for (let row = 0; row < TERRAIN_ROWS; row++) {
                    const v = row / (TERRAIN_ROWS - 1);
                    for (let col = 0; col < TERRAIN_COLS; col++) {
                        const u = col / (TERRAIN_COLS - 1);
                        terrainU[t] = u;
                        terrainV[t] = v;

                        const color = paletteColor(clamp(u * 0.82 + (1 - v) * 0.18, 0, 1));
                        terrainColors[t * 3] = color[0];
                        terrainColors[t * 3 + 1] = color[1];
                        terrainColors[t * 3 + 2] = color[2];
                        t++;
                    }
                }

                let p = 0;
                for (let col = 0; col < TRAIL_COLS; col++) {
                    const u = col / (TRAIL_COLS - 1);
                    const color = paletteColor(clamp(u * 0.86 + 0.08, 0, 1));
                    for (let seg = 0; seg < TRAIL_SEGMENTS; seg++) {
                        trailColors[p * 3] = color[0];
                        trailColors[p * 3 + 1] = color[1];
                        trailColors[p * 3 + 2] = color[2];
                        p++;
                    }
                }
            }

            function uploadStaticBuffers() {
                gl.bindBuffer(gl.ARRAY_BUFFER, terrainColorBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, terrainColors, gl.STATIC_DRAW);

                gl.bindBuffer(gl.ARRAY_BUFFER, trailColorBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, trailColors, gl.STATIC_DRAW);
            }

            function bindAttribute(buffer, location, size) {
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.enableVertexAttribArray(location);
                gl.vertexAttribPointer(location, size, gl.FLOAT, false, 0, 0);
            }

            function resize() {
                const dpr = Math.max(1, Math.min(1.25, window.devicePixelRatio || 1));
                canvas.width = Math.floor(window.innerWidth * dpr);
                canvas.height = Math.floor(window.innerHeight * dpr);
                gl.viewport(0, 0, canvas.width, canvas.height);
            }

            function updateSpectrum(now) {
                if (analyser) {
                    analyser.getByteFrequencyData(freq);
                    let peak = 0;
                    let peakBin = 0;
                    for (let i = 0; i < TERRAIN_COLS; i++) {
                        const raw = Math.pow(freq[columnBins[i]] / 255, 1.4);
                        spectrum[i] = spectrum[i] * 0.78 + raw * 0.22;
                        if (spectrum[i] > peak) {
                            peak = spectrum[i];
                            peakBin = columnBins[i];
                        }
                    }
                    dominantHz = (peakBin / Math.max(1, freq.length - 1)) * (ac.sampleRate / 2);
                    return;
                }

                for (let i = 0; i < TERRAIN_COLS; i++) {
                    const u = i / (TERRAIN_COLS - 1);
                    const idle = 0.08
                        + 0.05 * Math.sin(now * 0.00055 + u * 18)
                        + 0.03 * Math.cos(now * 0.00023 + u * 42);
                    spectrum[i] = spectrum[i] * 0.92 + clamp(idle, 0, 0.22) * 0.08;
                }
            }

            function terrainHeight(u, v, now) {
                const mirror = Math.abs(u - 0.5) * 2;
                const band = spectrum[Math.min(TERRAIN_COLS - 1, Math.floor(mirror * (TERRAIN_COLS - 1)))];
                const detail = spectrum[Math.min(TERRAIN_COLS - 1, Math.floor(u * (TERRAIN_COLS - 1)))];
                const near = 1 - v;
                const swell = Math.pow(band, 1.2) * (4.4 * (0.45 + near * 0.95));
                const ripple = Math.sin(u * 14.0 + now * 0.0008 - v * 16.0) * (0.35 + near * 0.55);
                const ridge = Math.cos(u * 22.0 - v * 28.0 + now * 0.00034) * (0.12 + detail * 0.3);
                return -3.8 + swell + ripple + ridge;
            }

            function updateTerrain(now) {
                let p = 0;
                for (let i = 0; i < TERRAIN_COUNT; i++) {
                    const u = terrainU[i];
                    const v = terrainV[i];
                    const near = 1 - v;
                    const width = 17.5;
                    const x = (u - 0.5) * width;
                    const z = 2.2 + v * 23.5;
                    const y = terrainHeight(u, v, now);
                    const band = spectrum[Math.min(TERRAIN_COLS - 1, Math.floor(u * (TERRAIN_COLS - 1)))];
                    const crest = Math.pow(clamp(band, 0, 1), 1.25);

                    terrainPositions[p] = x;
                    terrainPositions[p + 1] = y;
                    terrainPositions[p + 2] = z;
                    terrainSizes[i] = 2.0 + crest * 5.4 + near * 0.6;
                    p += 3;
                }
            }

            function updateTrails(now) {
                let p = 0;
                for (let col = 0; col < TRAIL_COLS; col++) {
                    const u = col / (TRAIL_COLS - 1);
                    const amp = spectrum[col];
                    const active = Math.pow(clamp((amp - 0.1) * 1.35, 0, 1), 1.15);
                    const vBase = 0.24 + (1 - active) * 0.06;
                    const x = (u - 0.5) * 17.5;
                    const z = 2.2 + vBase * 23.5;
                    const crestY = terrainHeight(u, vBase, now);

                    for (let seg = 0; seg < TRAIL_SEGMENTS; seg++) {
                        const f = seg / (TRAIL_SEGMENTS - 1);
                        const idx = col * TRAIL_SEGMENTS + seg;
                        trailPositions[p] = x;
                        trailPositions[p + 1] = crestY + f * active * 6.8;
                        trailPositions[p + 2] = z - f * 0.1;
                        trailSizes[idx] = active > 0.02 ? (0.8 + (1 - f) * 1.8 + active * 3.0) : 0.01;
                        p += 3;
                    }
                }
            }

            function uploadDynamicBuffers() {
                gl.bindBuffer(gl.ARRAY_BUFFER, terrainPosBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, terrainPositions, gl.DYNAMIC_DRAW);

                gl.bindBuffer(gl.ARRAY_BUFFER, terrainSizeBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, terrainSizes, gl.DYNAMIC_DRAW);

                gl.bindBuffer(gl.ARRAY_BUFFER, trailPosBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, trailPositions, gl.DYNAMIC_DRAW);

                gl.bindBuffer(gl.ARRAY_BUFFER, trailSizeBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, trailSizes, gl.DYNAMIC_DRAW);
            }

            function render(now) {
                updateSpectrum(now);
                updateTerrain(now);
                updateTrails(now);
                uploadDynamicBuffers();

                gl.clearColor(0, 0, 0, 1);
                gl.clear(gl.COLOR_BUFFER_BIT);

                gl.useProgram(program);
                gl.uniform1f(locAspect, canvas.width / canvas.height);
                gl.uniform1f(locPointScale, canvas.height * 0.11);

                bindAttribute(terrainPosBuffer, locPosition, 3);
                bindAttribute(terrainColorBuffer, locColor, 3);
                bindAttribute(terrainSizeBuffer, locSize, 1);
                gl.drawArrays(gl.POINTS, 0, TERRAIN_COUNT);

                bindAttribute(trailPosBuffer, locPosition, 3);
                bindAttribute(trailColorBuffer, locColor, 3);
                bindAttribute(trailSizeBuffer, locSize, 1);
                gl.drawArrays(gl.POINTS, 0, TRAIL_COUNT);

                requestAnimationFrame(render);
            }

            async function startAudio() {
                if (started) return;
                started = true;
                try {
                    ac = new (window.AudioContext || window.webkitAudioContext)();
                    stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        }
                    });
                    const src = ac.createMediaStreamSource(stream);
                    analyser = ac.createAnalyser();
                    analyser.fftSize = 2048;
                    analyser.smoothingTimeConstant = 0.85;
                    src.connect(analyser);
                    freq = new Uint8Array(analyser.frequencyBinCount);
                    rebuildBinMap();
                    await ac.resume();
                } catch (_) {
                    started = false;
                }
            }

            canvas.addEventListener('pointerdown', startAudio, { passive: true });
            window.addEventListener('resize', resize);

            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

            resize();
            initStaticData();
            uploadStaticBuffers();
            requestAnimationFrame(render);
        })();
    </script>
</body>

</html>
